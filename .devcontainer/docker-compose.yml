services:
  devcontainer:
    build:
      # Paths in merged compose files resolve against the *base* file's
      # directory (the repo root), not this file's directory.
      context: ./.devcontainer
      dockerfile: Dockerfile
    volumes:
      # Like build.context above, this resolves against the base compose
      # file's directory (the repo root), so "." is the repo itself.
      - .:/workspace:cached
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    environment:
      # Override the localhost defaults in appsettings.Development.json with
      # compose-network addresses; env vars take precedence over appsettings.
      - ConnectionStrings__Database=Host=postgres;Port=5432;Database=clean-architecture;Username=postgres;Password=postgres;Include Error Detail=true
      - Serilog__WriteTo__1__Args__ServerUrl=http://seq:5341
