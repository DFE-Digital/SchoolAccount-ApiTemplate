name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: "10.x"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore SchoolAccount.ApiTemplate.slnx

      - name: Build
        run: dotnet build SchoolAccount.ApiTemplate.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SchoolAccount.ApiTemplate.slnx --configuration Release --no-restore --no-build -- --report-gh --report-trx --coverage --coverage-output-format cobertura --coverage-settings ${{ github.workspace }}/coverage.config

#      - name: Test report
#        uses: EnricoMi/publish-unit-test-result-action@v2
#        if: ${{ !cancelled() }}
#        with:
#          files: "TestResults/*.trx"
#          
#      - name: Test report
#        uses: dorny/test-reporter@v3
#        if: ${{ !cancelled() }}
#        with:
#          name: Tests
#          path: "TestResults/*.trx"
#          reporter: dotnet-trx

      # Each test project writes its own cobertura file; merge them into one
      # report. Raise the threshold as coverage improves; it blocks the build
      # (and any PR that requires this check) when line coverage drops below it.
      - name: Merge coverage and enforce threshold
        if: ${{ !cancelled() }}
        run: |
          dotnet tool restore
          dotnet reportgenerator -reports:"TestResults/*.cobertura.xml" -targetdir:TestResults/Merged -reporttypes:"Cobertura;MarkdownSummaryGithub" /minimumCoverageThresholds:lineCoverage=15

      - name: Write coverage job summary
        if: ${{ !cancelled() }}
        run: cat TestResults/Merged/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish
        run: dotnet publish SchoolAccount.ApiTemplate.slnx --configuration Release --no-restore --no-build
